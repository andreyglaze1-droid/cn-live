name: Narcos Aria2 Extreme

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2

      - name: Start Aria2 Stream
        env:
          MAGNET_LINK: ${{ secrets.MAGNET_LINK_NARCOS }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY_NARCOS }}
        run: |
          # 1. Запускаем скачивание первой серии в фоне
          # --seed-time=0 (не раздаем), --summary-interval=1 (часто обновляем статус)
          aria2c --allow-overwrite=true --seed-time=0 --max-download-limit=10M \
          --bt-metadata-only=false --bt-save-metadata=true \
          --follow-torrent=mem "$MAGNET_LINK" &
          
          sleep 30 # Даем 30 секунд на поиск пиров через DHT
          
          while true; do
            # Ищем самый большой файл, который начал качаться (это и есть серия)
            VIDEO_FILE=$(find . -maxdepth 2 -type f -name "*.mkv" -o -name "*.mp4" | head -n 1)
            
            if [ -z "$VIDEO_FILE" ]; then
              echo "🔎 Все еще ищем файл в торренте..."
              sleep 10
              continue
            fi
            
            echo "✅ Нашелся файл: $VIDEO_FILE. Начинаем стрим прямо во время загрузки!"
            
            # Стримим файл, пока он качается (tail -f передает данные в ffmpeg)
            # Это имитация стриминга
            ffmpeg -re -i "$VIDEO_FILE" \
            -vcodec libx264 -preset superfast -b:v 6000k \
            -f flv "$TELEGRAM_KEY" || true
            
            sleep 10
          done
