name: Narcos Torrent Marathon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo npm install -g webtorrent-cli

      - name: Start Marathon
        env:
          MAGNET_LINK: ${{ secrets.MAGNET_LINK_NARCOS }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY_NARCOS }}
        run: |
          while true; do
            echo "🔎 Ищем пиров и список файлов в торренте (ждем 40 сек)..."
            
            # Даем Webtorrent время зацепиться за сидов и сохраняем список
            timeout 45s webtorrent "$MAGNET_LINK" --list > torrent_list.txt || true
            
            # Вырезаем только названия видеофайлов (убираем лишние колонки и пробелы)
            # Мы ищем строки с расширениями и берем название файла целиком
            FILES=$(grep -iE '\.(mkv|mp4|avi)$' torrent_list.txt | sed 's/^[[:space:]]*//' | awk '{print substr($0, index($0,$4))}' | sort)

            if [ -z "$FILES" ]; then
              echo "❌ Видеофайлы не найдены или сидов слишком мало."
              echo "--- Содержимое торрента для отладки ---"
              cat torrent_list.txt
              echo "---------------------------------------"
              echo "Пробуем снова через 30 секунд..."
              sleep 30
              continue
            fi

            echo "✅ Найдено серий для марафона:"
            echo "$FILES"

            # Запускаем цикл по каждой найденной серии
            echo "$FILES" | while read -r FILE; do
              echo "🎥 СТРИМИМ СЕРИЮ: $FILE"
              
              # Запускаем Webtorrent в режиме стрима и передаем в FFmpeg
              webtorrent "$MAGNET_LINK" --select "$FILE" --stdout | \
              ffmpeg -re -i pipe:0 \
              -vcodec libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
              -f flv "$TELEGRAM_KEY" || true
              
              echo "⌛ Серия '$FILE' завершена. Пауза 10 сек перед следующей..."
              sleep 10
            done
            
            echo "🏁 Весь список проигран. Перезапуск марафона через минуту..."
            sleep 60
          done
