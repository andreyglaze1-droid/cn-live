name: Narcos Torrent Marathon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo npm install -g webtorrent-cli

      - name: Start Marathon
        env:
          MAGNET_LINK: ${{ secrets.MAGNET_LINK_NARCOS }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY_NARCOS }}
        run: |
          while true; do
            echo "🔎 Ищем пиров и файлы в торренте..."
            
            # Используем команду 'stdout' с флагом '--list', чтобы увидеть файлы
            # Даем время на поиск пиров (timeout 45s)
            timeout 45s webtorrent "$MAGNET_LINK" --list > torrent_files.txt || true
            
            # Очищаем список от мусора и берем только названия видеофайлов
            FILES=$(grep -iE '\.(mkv|mp4|avi)$' torrent_files.txt | sed 's/^[[:space:]]*//' | awk '{print $NF}' | sort)

            if [ -z "$FILES" ]; then
              echo "❌ Файлы не найдены. Пробуем альтернативную команду..."
              # План Б: если --list не сработал, пробуем просто распарсить инфо
              timeout 30s webtorrent "$MAGNET_LINK" > torrent_files.txt || true
              FILES=$(grep -iE '\.(mkv|mp4|avi)$' torrent_files.txt | awk '{print $NF}' | sort)
            fi

            if [ -z "$FILES" ]; then
              echo "⚠️ Не удалось получить список. Содержимое лога:"
              cat torrent_files.txt
              sleep 30
              continue
            fi

            echo "✅ Найдено серий:"
            echo "$FILES"

            echo "$FILES" | while read -r FILE; do
              echo "🎥 СТРИМИМ: $FILE"
              
              # Стримим конкретный файл через пайп в ffmpeg
              webtorrent "$MAGNET_LINK" --select "$FILE" --stdout | \
              ffmpeg -re -i pipe:0 \
              -vcodec libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
              -f flv "$TELEGRAM_KEY" || true
              
              echo "⌛ Серия завершена. Пауза 10 сек..."
              sleep 10
            done
            
            sleep 60
          done
