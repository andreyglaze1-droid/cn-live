name: CN_ULTRA_HD_SIBERIA_FINAL

on:
  workflow_dispatch:      # Кнопка ручного запуска
  schedule:
    - cron: '0 */6 * * *' # Автозапуск каждые 6 часов

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Лимит GitHub на одну задачу

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Global Stealth Stream (Corrected)
        env:
          KEY: ${{ secrets.TELEGRAM_KEY }}
        run: |
          # Прямая ссылка на сибирский поток
          URL="http://176.118.197.101/Cartoon_Network/index.m3u8"
          
          echo "🚀 Попытка запуска: Маскировка под VLC + Ultra HD (10Mbps)..."

          # timeout 350m (5ч 50мин) завершит процесс до лимита GitHub
          # Убраны все спорные флаги, оставлена только рабочая база
          
          timeout 350m ffmpeg -re \
            -headers "User-Agent: VLC/3.0.18 LibVLC/3.0.18" \
            -headers "Referer: http://176.118.197.101/" \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 30 \
            -thread_queue_size 8192 \
            -protocol_whitelist file,http,https,tcp,tls \
            -i "$URL" \
            -vf "unsharp=5:5:1.2:5:5:0.6" \
            -vcodec libx264 -preset superfast -crf 16 -tune animation \
            -b:v 10000k -maxrate 12000k -bufsize 20000k \
            -pix_fmt yuv420p -g 50 \
            -c:a aac -b:a 192k -ar 48000 \
            -f flv "$KEY" || echo "⏰ Сессия завершена."
