name: CN_ULTRA_HD_BRANDED_V3

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install FFmpeg and Universal Fonts
        run: |
          sudo apt-get update
          # Устанавливаем базовые шрифты и утилиту для их регистрации в системе
          sudo apt-get install -y ffmpeg fonts-liberation fontconfig
          # Обновляем кэш шрифтов, чтобы FFmpeg их сразу увидел
          fc-cache -fv

      - name: Branded Stealth Stream
        env:
          KEY: ${{ secrets.TELEGRAM_KEY }}
        run: |
          URL="http://176.118.197.101/Cartoon_Network/index.m3u8"
          
          echo "🚀 Запуск вещания @cnworldwide (Версия с гарантированным текстом)..."

          # Настройки текста: 
          # x=50, y=50 (Левый верхний угол)
          # fontsize=50 (Крупно)
          # fontcolor=white@0.8 (Почти непрозрачный)
          # shadow=black (Черный контур, чтобы читалось на белом фоне)
          
          timeout 350m ffmpeg -re \
            -headers "User-Agent: VLC/3.0.18 LibVLC/3.0.18" \
            -headers "Referer: http://176.118.197.101/" \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 30 \
            -thread_queue_size 8192 \
            -i "$URL" \
            -vf "unsharp=5:5:1.2:5:5:0.6,drawtext=text='@cnworldwide':x=50:y=50:fontsize=50:fontcolor=white@0.8:shadowcolor=black@0.9:shadowx=3:shadowy=3" \
            -vcodec libx264 -preset superfast -crf 17 -tune animation \
            -b:v 9000k -maxrate 11000k -bufsize 18000k \
            -pix_fmt yuv420p -g 50 \
            -c:a aac -b:a 192k -ar 48000 \
            -f flv "$KEY" || echo "⏰ Сессия завершена."
