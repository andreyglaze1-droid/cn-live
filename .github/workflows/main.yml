name: CN_ULTRA_12MBPS_EXTREME

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 часов лимита

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Extreme Stream Loop
        env:
          KEY: ${{ secrets.TELEGRAM_KEY }}
        run: |
          URL="http://176.118.197.101/Cartoon_Network/index.m3u8"
          
          echo "📡 Запуск экстремального вещания 12к..."
          
          # Бесконечный цикл живучести
          while true; do
            echo "🎬 Эфир: 12000kbps..."
            
            # Мы убрали фильтры (-vf), оставили только чистую перепаковку с мощным битрейтом
            ffmpeg -re \
              -headers "User-Agent: VLC/3.0.18 LibVLC/3.0.18" \
              -headers "Referer: http://176.118.197.101/" \
              -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 2 \
              -fflags +genpts+discardcorrupt \
              -i "$URL" \
              -vcodec libx264 -preset ultrafast -tune animation \
              -b:v 12000k -maxrate 14000k -bufsize 24000k \
              -pix_fmt yuv420p -g 100 \
              -af "volume=1.2" \
              -c:a aac -b:a 256k -ar 48000 \
              -f flv "$KEY" || echo "⚠️ Разрыв соединения..."
              
            echo "🔄 Мгновенный перезапуск через 2 секунды..."
            sleep 2
          done
