name: CN Worldwide Live Stream

on:
  schedule:
    - cron: '0 */6 * * *' # Перезапуск каждые 6 часов
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY }}
        run: |
          ffmpeg -re -i "$STREAM_URL" \
          -vcodec libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "$TELEGRAM_KEY"
