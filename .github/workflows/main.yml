name: CN_ULTRA_HD_BRANDED_FINAL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          # Устанавливаем сам ffmpeg и пакет шрифтов, чтобы водяной знак точно отрисовался
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Branded Stealth Stream
        env:
          KEY: ${{ secrets.TELEGRAM_KEY }}
        run: |
          URL="http://176.118.197.101/Cartoon_Network/index.m3u8"
          
          echo "🚀 Запуск брендированного вещания @cnworldwide..."

          # Используем путь к шрифту LiberationSans-Bold (стандарт в Ubuntu)
          # Текст будет в правом верхнем углу с небольшим отступом (50px)
          
          timeout 350m ffmpeg -re \
            -headers "User-Agent: VLC/3.0.18 LibVLC/3.0.18" \
            -headers "Referer: http://176.118.197.101/" \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 30 \
            -thread_queue_size 8192 \
            -i "$URL" \
            -vf "unsharp=5:5:1.2:5:5:0.6,drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='@cnworldwide':x=w-tw-50:y=50:fontsize=44:fontcolor=white@0.6:shadowcolor=black@0.8:shadowx=2:shadowy=2" \
            -vcodec libx264 -preset superfast -crf 17 -tune animation \
            -b:v 9000k -maxrate 11000k -bufsize 18000k \
            -pix_fmt yuv420p -g 50 \
            -c:a aac -b:a 192k -ar 48000 \
            -f flv "$KEY" || echo "⏰ Сессия завершена."
