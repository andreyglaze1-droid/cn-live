name: Nickelodeon_ULTRA_HD

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Ultra Stream
        env:
          URL: ${{ secrets.STREAM_URL_NICK }}
          KEY: ${{ secrets.TELEGRAM_KEY_NICK }}
        run: |
          while true; do
            echo "🚀 Поток пошел! Битрейт 7500k, режим 'Без мыла'..."
            
            # Команда настроена под твой последний curl
            ffmpeg -re \
              -protocol_whitelist file,http,https,tcp,tls \
              -user_agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36" \
              -headers "Accept: */*"$'\r\n'"Origin: https://ritsatv.ru"$'\r\n'"Referer: https://ritsatv.ru/"$'\r\n'"Sec-Fetch-Dest: empty"$'\r\n'"Sec-Fetch-Mode: cors"$'\r\n'"Sec-Fetch-Site: cross-site" \
              -i "$URL" \
              -vf "unsharp=3:3:0.8:3:3:0.4" \
              -vcodec libx264 -preset fast -crf 17 -tune animation \
              -b:v 7500k -maxrate 10000k -bufsize 15000k \
              -pix_fmt yuv420p -g 50 \
              -c:a aac -b:a 192k -ar 48000 \
              -f flv "$KEY" || echo "⚠️ Ошибка! Возможно, токен в ссылке протух."

            echo "🔄 Перезапуск через 10 секунд..."
            sleep 10
          done
